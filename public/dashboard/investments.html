<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Investments — AgricLife</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
</head>
<body>
<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="hamburger-dash" id="hamburgerDash"><span></span><span></span><span></span></div>
        <div class="topbar-title">My Investments</div>
      </div>
      <div class="topbar-right">
        <a href="/dashboard/stocks.html" class="btn btn-primary btn-sm">+ New Investment</a>
      </div>
    </div>
    <div class="dash-content">
      <!-- Summary Cards -->
      <div class="stats-row" id="invStats">
        <div class="stat-card"><div class="stat-card-icon icon-blue">🌱</div><div class="stat-card-info"><div class="stat-label">Active</div><div class="stat-val" id="cnt-active">—</div></div></div>
        <div class="stat-card"><div class="stat-card-icon icon-green">✅</div><div class="stat-card-info"><div class="stat-label">Completed</div><div class="stat-val" id="cnt-completed">—</div></div></div>
        <div class="stat-card"><div class="stat-card-icon icon-gold">💰</div><div class="stat-card-info"><div class="stat-label">Total Invested</div><div class="stat-val" id="cnt-invested">—</div></div></div>
        <div class="stat-card"><div class="stat-card-icon icon-purple">📈</div><div class="stat-card-info"><div class="stat-label">Total Earned</div><div class="stat-val" id="cnt-earned">—</div></div></div>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <select class="form-control form-select" id="statusFilter" onchange="loadInvestments()" style="max-width:180px;">
          <option value="">All Investments</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div id="invList"></div>
    </div>
  </main>
</div>

<script src="/js/auth-guard.js"></script>
<script>
  if (!requireAuth()) throw '';
  const user = getUser();
  const sym = user?.currencySymbol || 'GH₵';
  document.getElementById('sidebar').innerHTML = buildSidebar(user);
  setSidebarActive('nav-investments');
  initSidebarToggle();

  async function loadInvestments() {
    const status = document.getElementById('statusFilter').value;
    const data = await apiFetch('/api/investments' + (status ? '?status=' + status : ''));
    const list = document.getElementById('invList');
    if (!data?.success || !data.investments.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌾</div><h3>No Investments Found</h3><p>Start investing in agricultural portfolios to see your investments here.</p><a href="/dashboard/stocks.html" class="btn btn-primary">Browse Stocks</a></div>`;
      return;
    }
    const icons = { Animals:'🐄', 'Food Farms':'🌾' };
    const thumb = inv => inv.stockSnapshot?.image
      ? `<img src="${inv.stockSnapshot.image}" alt="${inv.stockSnapshot.name}" style="width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0;"/>`
      : `<div style="width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;">${icons[inv.stockSnapshot?.category]||'🌱'}</div>`;
    let totalInvested = 0, totalEarned = 0, active = 0, completed = 0;
    list.innerHTML = data.investments.map(inv => {
      totalInvested += inv.amountInvested;
      if (inv.status === 'completed') { totalEarned += inv.roiAmount; completed++; }
      if (inv.status === 'active') active++;
      const now = Date.now(), end = new Date(inv.endDate).getTime(), start = new Date(inv.startDate).getTime();
      const pct = inv.status === 'completed' ? 100 : Math.min(100, Math.max(0, Math.round(((now - start) / (end - start)) * 100)));
      const daysLeft = Math.max(0, Math.ceil((end - now) / 86400000));
      const hrs = Math.max(0, Math.ceil((end - now) / 3600000));
      return `
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-body" style="padding:18px;">
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            ${thumb(inv)}
            <div style="flex:1;min-width:160px;">
              <div style="font-weight:700;font-size:1rem;margin-bottom:2px;">${inv.stockSnapshot?.name || 'Investment'}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${inv.stockSnapshot?.category} • Started ${new Date(inv.startDate).toLocaleDateString()}</div>
              <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
              <div class="progress-label">
                <span>${pct}% complete</span>
                <span>${inv.status === 'completed' ? 'Matured ✅' : `Matures: ${new Date(inv.endDate).toLocaleDateString()} (${daysLeft > 0 ? daysLeft+'d' : hrs+'h'} left)`}</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-size:1.2rem;font-weight:800;color:var(--primary);">${fmt(inv.amountInvested, sym)}</div>
              <div style="color:var(--accent);font-weight:600;font-size:14px;">+${fmt(inv.roiAmount, sym)} ROI</div>
              <div style="margin-top:6px;">${statusBadge(inv.status)}</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;">
            <div style="background:var(--bg-light);padding:8px 14px;border-radius:8px;font-size:13px;"><span style="color:var(--text-muted);">Duration:</span> <strong>${inv.stockSnapshot?.duration} ${inv.stockSnapshot?.durationUnit}</strong></div>
            <div style="background:var(--bg-light);padding:8px 14px;border-radius:8px;font-size:13px;"><span style="color:var(--text-muted);">ROI:</span> <strong style="color:var(--accent);">${inv.stockSnapshot?.roiPercentage}%</strong></div>
            <div style="background:var(--bg-light);padding:8px 14px;border-radius:8px;font-size:13px;"><span style="color:var(--text-muted);">Total Return:</span> <strong style="color:var(--primary);">${fmt(inv.totalReturn, sym)}</strong></div>
          </div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('cnt-active').textContent = active;
    document.getElementById('cnt-completed').textContent = completed;
    document.getElementById('cnt-invested').textContent = fmt(totalInvested, sym);
    document.getElementById('cnt-earned').textContent = fmt(totalEarned, sym);
  }

  syncBalance();
  loadInvestments();
</script>
</body>
</html>
