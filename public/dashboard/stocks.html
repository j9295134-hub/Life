<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Stocks — AgricLife</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
</head>
<body>
<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="hamburger-dash" id="hamburgerDash"><span></span><span></span><span></span></div>
        <div class="topbar-title">Browse Stocks</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-wallet">Balance: <span id="topBalance">—</span></div>
      </div>
    </div>
    <div class="dash-content">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <input type="text" class="form-control" placeholder="🔍 Search stocks..." id="searchInput" oninput="filterStocks()" style="max-width:260px;"/>
        <select class="form-control form-select" id="catFilter" onchange="filterStocks()" style="max-width:180px;">
          <option value="">All Categories</option>
          <option value="Animals">🐄 Livestock</option>
          <option value="Food Farms">🌾 Food Farms</option>
        </select>
        <select class="form-control form-select" id="riskFilter" onchange="filterStocks()" style="max-width:160px;">
          <option value="">All Risk Levels</option>
          <option value="Low">Low Risk</option>
          <option value="Medium">Medium Risk</option>
          <option value="High">High Risk</option>
        </select>
      </div>

      <div class="stocks-grid" id="stocksGrid">
        <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);">Loading portfolios...</div>
      </div>
    </div>
  </main>
</div>

<!-- Invest Modal -->
<div class="modal-overlay" id="investModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Confirm Investment</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script>
  if (!requireAuth()) throw '';
  const user = getUser();
  document.getElementById('sidebar').innerHTML = buildSidebar(user);
  setSidebarActive('nav-stocks');
  initSidebarToggle();

  let allStocks = [];
  const sym = user?.currencySymbol || 'GH₵';
  document.getElementById('topBalance').textContent = fmt(user?.walletBalance, sym);

  async function loadStocks() {
    const data = await apiFetch('/api/stocks');
    if (!data?.success) return;
    allStocks = data.stocks;
    renderStocks(allStocks);
  }

  function filterStocks() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    const risk = document.getElementById('riskFilter').value;
    renderStocks(allStocks.filter(s =>
      (!search || s.name.toLowerCase().includes(search) || s.description.toLowerCase().includes(search)) &&
      (!cat || s.category === cat) &&
      (!risk || s.riskLevel === risk)
    ));
  }

  function renderStocks(stocks) {
    const grid = document.getElementById('stocksGrid');
    if (!stocks.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><h3>No Stocks Found</h3><p>Try adjusting your search or filters.</p></div>`;
      return;
    }
    const icons = { Animals:'🐄', 'Food Farms':'🌾' };
    grid.innerHTML = stocks.map(s => {
      const totalReturn = s.price + (s.price * s.roiPercentage / 100);
      const isFull = s.totalSlots && s.usedSlots >= s.totalSlots;
      return `
      <div class="stock-card">
        <div class="stock-card-img">
          ${s.image ? `<img src="${s.image}" alt="${s.name}" loading="lazy"/>` : `<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:5rem;">${icons[s.category]||'🌱'}</div>`}
          <span class="stock-card-category">${s.category}</span>
          <span class="stock-card-risk risk-${(s.riskLevel||'Low').toLowerCase()}">${s.riskLevel||'Low'} Risk</span>
        </div>
        <div class="stock-card-body">
          <h3>${s.name}</h3>
          <p>${s.description.slice(0,100)}${s.description.length>100?'...':''}</p>
          <div class="stock-meta">
            <div class="stock-meta-item"><div class="meta-label">Investment</div><div class="meta-value">${sym}${s.price.toLocaleString()}</div></div>
            <div class="stock-meta-item"><div class="meta-label">Duration</div><div class="meta-value">${s.duration} ${s.durationUnit}</div></div>
            <div class="stock-meta-item"><div class="meta-label">ROI</div><div class="meta-value" style="color:var(--accent)">${s.roiPercentage}%</div></div>
            <div class="stock-meta-item"><div class="meta-label">Slots</div><div class="meta-value" style="font-size:12px">${s.totalSlots ? (s.totalSlots - s.usedSlots) + ' left' : 'Unlimited'}</div></div>
          </div>
          <div class="stock-return">
            <div class="return-label">Total Payout at Maturity</div>
            <div class="return-value">${sym}${totalReturn.toFixed(2)}</div>
          </div>
          ${isFull
            ? `<button class="btn" style="width:100%;background:#e9ecef;color:var(--text-muted);cursor:not-allowed;" disabled>Fully Subscribed</button>`
            : `<button class="btn btn-primary" style="width:100%;" onclick="openInvest(${JSON.stringify(s).replace(/"/g,'&quot;')})">Invest Now</button>`}
        </div>
      </div>`;
    }).join('');
  }

  function openInvest(s) {
    const totalReturn = s.price + (s.price * s.roiPercentage / 100);
    const bal = user?.walletBalance || 0;
    const canInvest = bal >= s.price;
    document.getElementById('modalBody').innerHTML = `
      <div style="background:var(--bg-light);border-radius:12px;overflow:hidden;margin-bottom:20px;">
        ${s.image
          ? `<img src="${s.image}" alt="${s.name}" style="width:100%;height:160px;object-fit:cover;display:block;"/>`
          : `<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;">${s.category==='Animals'?'🐄':'🌾'}</div>`}
        <div style="padding:12px 16px;">
          <div style="font-weight:700;font-size:1.1rem;margin-bottom:4px;">${s.name}</div>
          <div style="font-size:13px;color:var(--text-muted);">${s.category}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <div style="background:var(--bg-light);padding:12px;border-radius:10px;"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">Investment</div><div style="font-weight:700;font-size:1.1rem;color:var(--primary);">${sym}${s.price}</div></div>
        <div style="background:var(--bg-light);padding:12px;border-radius:10px;"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">Duration</div><div style="font-weight:700;font-size:1.1rem;">${s.duration} ${s.durationUnit}</div></div>
        <div style="background:var(--bg-light);padding:12px;border-radius:10px;"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">ROI</div><div style="font-weight:700;font-size:1.1rem;color:var(--accent);">${s.roiPercentage}%</div></div>
        <div style="background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:12px;border-radius:10px;color:#fff;"><div style="font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.5px;">You Receive</div><div style="font-weight:700;font-size:1.1rem;">${sym}${totalReturn.toFixed(2)}</div></div>
      </div>
      <div style="background:${canInvest?'rgba(30,107,60,.07)':'#fff3cd'};border:1px solid ${canInvest?'var(--border)':'#ffeaa7'};border-radius:10px;padding:12px;margin-bottom:20px;font-size:14px;">
        <strong>Your Wallet Balance:</strong> ${sym}${bal.toFixed(2)}<br>
        ${canInvest ? '<span style="color:var(--primary);">✓ Sufficient balance to invest.</span>' : `<span style="color:#856404;">⚠ Insufficient balance. <a href="/dashboard/wallet.html" style="color:var(--primary);font-weight:600;">Deposit funds</a> first.</span>`}
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">By investing, you agree to our <a href="/terms.html" target="_blank" style="color:var(--primary);">Terms & Conditions</a>. Returns are automatically credited to your wallet upon maturity.</p>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:2;" onclick="confirmInvest('${s._id}')" ${canInvest?'':'disabled'} id="confirmBtn">
          <span id="confirmBtnText">Confirm Investment</span>
          <span id="confirmSpinner" class="spinner" style="display:none;"></span>
        </button>
      </div>`;
    document.getElementById('investModal').classList.add('active');
  }

  function closeModal() { document.getElementById('investModal').classList.remove('active'); }

  async function confirmInvest(stockId) {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    document.getElementById('confirmBtnText').textContent = 'Processing...';
    document.getElementById('confirmSpinner').style.display = 'inline-block';
    const data = await apiFetch('/api/investments', { method:'POST', body: JSON.stringify({ stockId }) });
    if (data?.success) {
      closeModal();
      showToast('Investment successful! Your portfolio is now active.', 'success');
      // Update user balance
      const stats = await apiFetch('/api/user/dashboard-stats');
      if (stats?.success) {
        const u = getUser(); u.walletBalance = stats.stats.walletBalance;
        localStorage.setItem('user', JSON.stringify(u));
        document.getElementById('topBalance').textContent = fmt(u.walletBalance, sym);
      }
      loadStocks();
    } else {
      showToast(data?.message || 'Investment failed.', 'error');
      btn.disabled = false;
      document.getElementById('confirmBtnText').textContent = 'Confirm Investment';
      document.getElementById('confirmSpinner').style.display = 'none';
    }
  }

  syncBalance().then(s => {
    if (s) document.getElementById('topBalance').textContent = fmt(s.walletBalance, s.currencySymbol);
  });
  loadStocks();
</script>
</body>
</html>
